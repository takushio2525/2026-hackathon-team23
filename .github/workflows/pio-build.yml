name: PlatformIO Build

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/workflows/pio-build.yml'
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/workflows/pio-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ビルド対象のノードプロジェクト (firmware/ 配下の相対パス)
        dir:
          - test_v1/node_01
          - test_v1/node_02
          - test_v1/node_03
          - test_v1/node_04
          - test_v2/node_01
          - test_v2/node_02
          - test_v2/node_03
          - test_v2/node_04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ matrix.dir }}

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build firmware/${{ matrix.dir }}
        run: pio run -d firmware/${{ matrix.dir }}
