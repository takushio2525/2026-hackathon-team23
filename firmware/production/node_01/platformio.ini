; Build / Upload / Monitor (run from project root):
;   pio run -d firmware/production/node_01
;   pio run -d firmware/production/node_01 -t upload
;   pio device monitor -d firmware/production/node_01
;
; 指揮者ノード node_01 (XIAO ESP32-S3 Sense + MPU6050 / GY-521)
; テスト用: production/ から独立したスケッチ
;
; 配線:
;   D4 (GPIO5)  -> MPU6050 SDA
;   D5 (GPIO6)  -> MPU6050 SCL
;   3V3 / GND   -> MPU6050 電源
;   AD0         -> GND  (I2C アドレス 0x68 固定)
;   LED_BUILTIN -> 状態表示

[env:seeed_xiao_esp32s3]
; Arduino-ESP32 v2.0.17 ベースの安定版に固定する。
; espressif32 の最新 (>=51.x) は Arduino-ESP32 v3.x で Network.h を要求し、
; PlatformIO の LDF が拾いきれず "fatal error: Network.h" になることがある。
; v3.x を使いたい場合は pioarduino/platform-espressif32 を使う選択肢もある。
platform = espressif32@6.10.0
board = seeed_xiao_esp32s3
framework = arduino
; -I を明示する理由:
;   各 lib/<Module>/ 配下のソースから include/SystemData.h を経由して
;   別 library (OrcNetModule など) のヘッダを読むには、PlatformIO の
;   Library Dependency Finder だけでは不十分なため、include path を直接渡す。
build_flags =
    -I include
    -I ../common/lib/ModuleCore
    -I ../common/lib/OrcProtocol
    -I ../common/lib/OrcNetModule
    -I ../common/lib/StatusLedModule
    -I ../common/lib/SerialDebug
    ; ProjectConfig.h の inline 変数 (C++17) を正規にビルドする。
    ; Arduino-ESP32 v2.x の既定は gnu++11 で「inline variables are only available
    ; with -std=c++17」警告が出る (UNO R4 の Renesas コアは元から C++17 なので警告なし)。
    -std=gnu++17
    ; USB CDC を「内蔵 USB」として常時有効化 (Type-C ケーブル直挿しで書き込み&Serial)。
    ; これを付けると BOOT ボタンを押さずに pio run -t upload で書き込めて、
    ; 書き込み完了後に自動リセットでそのままユーザコードが起動する。
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; シリアルデバッグ出力を有効化 (0 で無効化)。
    ; ON のとき main.cpp / applyPattern.cpp が IMU・拍検出・状態遷移・送信統計を
    ; テキストで Serial に流す。pio device monitor でそのまま読める。
    -DSERIAL_DEBUG=1
; gnu++11 を外さないと -std が二重指定になり後勝ちが環境依存になる
build_unflags = -std=gnu++11
lib_extra_dirs = ../common/lib
lib_ldf_mode = deep+
monitor_speed = 115200
; シリアルモニタ接続時に DTR/RTS でボードを再起動させない
; (Processing 等が同時にシリアルを開いても勝手にリセットしないようにする)
monitor_dtr = 0
monitor_rts = 0
; テキスト出力をそのまま表示 (CR/LF 変換やエスケープを噛ませない)
monitor_filters = direct
; ESP32-S3 内蔵の USB Serial/JTAG コントローラ経由でフラッシュに直接書き込む。
; 「JTAG」と名前が付いているが、外部 JTAG プローブは不要で USB Type-C 1 本で完結する。
; BOOT / RESET ボタン操作なしで毎回自動書き込みできる。書き込みは esptool より
; 少し遅い (10–30 秒) が、XIAO ESP32-S3 のリセット回路の挙動に依存しないので確実。
upload_protocol = esp-builtin
upload_speed = 921600
