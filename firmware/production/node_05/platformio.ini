; Build / Upload / Monitor (run from project root):
;   pio run -d firmware/production/node_05
;   pio run -d firmware/production/node_05 -t upload
;   pio device monitor -d firmware/production/node_05
;
; PlatformIO プロジェクト設定ファイル
;
; ボード型番は暫定で Arduino Uno R4 WiFi を指定しています。
; 別のボードを使う場合は [env:xxx] の中身を差し替えてください。
; 例: Nano / ESP32 / ESP32-S3 など
;
; 参考: https://docs.platformio.org/en/latest/projectconf/index.html

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
