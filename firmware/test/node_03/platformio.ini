; Build / Upload / Monitor (run from project root):
;   pio run -d firmware/test/node_03
;   pio run -d firmware/test/node_03 -t upload
;   pio device monitor -d firmware/test/node_03
;
; 楽器ノード node_03 (Arduino UNO R4 WiFi, 金管 2, partId=0x03)
; テスト用: production/ から独立したスケッチ
;
; 役割:
;   - 指揮者ノード node_01 が立てる SoftAP "OrchestraAP" に STA で接続
;   - CTRL/BEAT を UDP マルチキャスト (239.0.0.1:5001) で受信
;   - マスタ時刻 playAtMasterMs に同期して楽譜を進め、NOTE を USB Serial で Mac へ送出

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
; -I を明示する理由:
;   各 lib/<Module>/ 配下のソースから include/SystemData.h を経由して
;   別 library (OrcNetModule など) のヘッダを読むには、PlatformIO の
;   Library Dependency Finder だけでは不十分なため、include path を直接渡す。
build_flags =
    -I include
    -I ../common/lib/ModuleCore
    -I ../common/lib/OrcProtocol
    -I ../common/lib/OrcNetModule
    -I ../common/lib/StatusLedModule
    -I ../common/lib/SerialDebug
    ; シリアルデバッグ出力を有効化 (0 で無効化)。
    ; ON のとき NoteSenderModule はバイナリ NotePacket 送信を抑止し、
    ; 代わりに人間可読テキストを Serial に流す。Processing 連携では 0 に戻す。
    -DSERIAL_DEBUG=0
lib_extra_dirs = ../common/lib
lib_ldf_mode = deep+
monitor_speed = 115200
monitor_filters = direct
