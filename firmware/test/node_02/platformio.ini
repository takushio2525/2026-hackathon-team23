; 楽器ノード node_02 (Arduino UNO R4 WiFi, 金管 1, partId=0x02)
; テスト用: production/ から独立したスケッチ
;
; 役割:
;   - 指揮者ノード node_01 が立てる SoftAP "OrchestraAP" に STA で接続
;   - CTRL/BEAT を UDP マルチキャスト (239.0.0.1:5001) で受信
;   - マスタ時刻 playAtMasterMs に同期して楽譜を進め、NOTE を USB Serial で Mac へ送出

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
build_flags = -I include
lib_extra_dirs = ../common/lib
monitor_speed = 115200
