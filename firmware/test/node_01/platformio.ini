; 指揮者ノード node_01 (XIAO ESP32-S3 Sense + MPU6050 / GY-521)
; テスト用: production/ から独立したスケッチ
;
; 配線:
;   D4 (GPIO5)  -> MPU6050 SDA
;   D5 (GPIO6)  -> MPU6050 SCL
;   3V3 / GND   -> MPU6050 電源
;   AD0         -> GND  (I2C アドレス 0x68 固定)
;   LED_BUILTIN -> 状態表示

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags = -I include
lib_extra_dirs = ../common/lib
monitor_speed = 115200
upload_speed = 921600
