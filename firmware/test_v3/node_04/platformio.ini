; Build / Upload / Monitor (run from project root):
;   pio run -d firmware/test_v3/node_04
;   pio run -d firmware/test_v3/node_04 -t upload
;   pio device monitor -d firmware/test_v3/node_04
;
; 楽器ノード node_04 — 輪唱「きらきら星」の声部 3 (Arduino UNO R4 WiFi, partId=0x04)
; partId / headRestBeats / instrumentId は include/ProjectConfig.h で決める。
;
; 役割:
;   - 指揮者ノード node_01 が立てる SoftAP "OrchestraAP" に STA で接続
;   - CTRL/BEAT を UDP マルチキャスト (239.0.0.1:5001) で受信
;   - 指揮者の拍番号に合わせて楽譜 (きらきら星) を進め、NOTE (楽器番号/長さ/高さ) を
;     USB Serial で Mac の Processing (orchestra_resynth) へ送出

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
; -I を明示する理由:
;   各 lib/<Module>/ 配下のソースから include/SystemData.h を経由して
;   別 library (OrcNetModule など) のヘッダを読むには、PlatformIO の
;   Library Dependency Finder だけでは不十分なため、include path を直接渡す。
build_flags =
    -I include
    -I ../common/lib/ModuleCore
    -I ../common/lib/OrcProtocol
    -I ../common/lib/OrcNetModule
    -I ../common/lib/StatusLedModule
    -I ../common/lib/SerialDebug
    ; シリアルデバッグ出力。test_v2 は Processing (orchestra_resynth) 連携が主目的なので
    ; 既定は 0 = バイナリ NotePacket を Serial に流す。1 にすると NotePacket 送信を抑止して
    ; 人間可読テキストを流す (pio device monitor でファームの挙動を読みたいとき用)。
    -DSERIAL_DEBUG=0
lib_extra_dirs = ../common/lib
lib_ldf_mode = deep+
monitor_speed = 115200
monitor_filters = direct
