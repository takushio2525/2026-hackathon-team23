; Build / Upload / Monitor (run from project root):
;   pio run -d firmware/test_v3/node_01_devkitc
;   pio run -d firmware/test_v3/node_01_devkitc -t upload
;   pio device monitor -d firmware/test_v3/node_01_devkitc
;
; 指揮者ノード node_01 (ESP32-S3-DevKitC-1 + MPU6050 / GY-521)
; アンテナ切り分け検証用: XIAO ESP32-S3 Sense (外付け IPEX アンテナ) で
; UDP パケロスが多発する症状を切り分けるため、PCB 内蔵アンテナの
; ESP32-S3-DevKitC-1 (N 版 / WROOM-1) に載せ替えて同じファームを動かす。
; test_v1/node_01_devkitc で良好結果が出たため test_v2 にも同じ派生を用意。
;
; ロジック (src/, lib/) は test_v2/node_01 と完全に同一。差分は
;   (1) board = esp32-s3-devkitc-1
;   (2) USB CDC を OFF (UART ブリッジ経由で書き込み・シリアル)
;   (3) upload_protocol を PlatformIO デフォルト (esptool) に変更
; のみ。ピン GPIO 番号 (I2C 5/6) はそのまま流用できる。
;
; 配線 (DevKitC-1 左列ピンヘッダ → GY-521):
;   GPIO5  -> MPU6050 SDA   (左列 上から 5 番目)
;   GPIO6  -> MPU6050 SCL   (左列 上から 6 番目)
;   3V3    -> MPU6050 VCC   (左列 最上段)
;   GND    -> MPU6050 GND   (左列 最下段)
;   AD0    -> GND  (I2C アドレス 0x68 固定)
;
; LED について:
;   DevKitC-1 の "User LED" は GPIO48 の WS2812 (ネオピクセル)。digitalWrite では
;   光らないが書き込み自体は害なし。状態確認は SERIAL_DEBUG=1 の Serial ログ
;   ([N1 t=... st=... wifi=... beatSeq=... ctrlSeq=...]) で行う。

[env:esp32-s3-devkitc-1]
; Arduino-ESP32 v2.0.17 ベースの安定版に固定する (node_01 と同じ理由)。
platform = espressif32@6.10.0
board = esp32-s3-devkitc-1
framework = arduino
; -I を明示する理由:
;   各 lib/<Module>/ 配下のソースから include/SystemData.h を経由して
;   別 library (OrcNetModule など) のヘッダを読むには、PlatformIO の
;   Library Dependency Finder だけでは不十分なため、include path を直接渡す。
build_flags =
    -I include
    -I ../common/lib/ModuleCore
    -I ../common/lib/OrcProtocol
    -I ../common/lib/OrcNetModule
    -I ../common/lib/StatusLedModule
    -I ../common/lib/SerialDebug
    ; DevKitC-1 は UART ブリッジ (CP210x) 側 Type-C で書き込み&シリアルを行う。
    ; XIAO のネイティブ USB 用 CDC フラグは外す。これを ON にすると UART 側で
    ; Serial.print が出なくなる。
    ; -DARDUINO_USB_MODE=1
    ; -DARDUINO_USB_CDC_ON_BOOT=1
    ; シリアルデバッグ出力を有効化 (0 で無効化)。
    -DSERIAL_DEBUG=1
lib_extra_dirs = ../common/lib
lib_ldf_mode = deep+
monitor_speed = 115200
; シリアルモニタ接続時に DTR/RTS でボードを再起動させない
monitor_dtr = 0
monitor_rts = 0
; テキスト出力をそのまま表示
monitor_filters = direct
; XIAO の esp-builtin (USB JTAG) ではなく、DevKitC は UART ブリッジ側で
; esptool による書き込みが標準。upload_protocol を省略して PlatformIO デフォルト
; (= esptool / シリアル) に任せる。
; upload_protocol = esp-builtin
upload_speed = 921600
